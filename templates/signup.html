<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ThreatLens - Signup</title>

<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>
   <nav class="navbar">
    <div class="logo">ThreatLens</div>
    <ul class="nav-links">
      <li><a href="home">Home</a></li>
      <li><a href="analyse">Analyse</a></li>
            <li><a href="history">History</a></li>

      <li><a href="about">About us</a></li>
      <li><a href="contact">Contact us</a></li>
      {%if session['user_id']%}
      <li><a href="logout">Logout</a></li>
      {%else%}
      <li><a href="login">Login</a></li>
      <li><a href="signup">Signup</a></li>
      {%endif%}
    </ul>
  </nav>

  <section class="container">
    <div class="left-box">
      <h1>Account Signup</h1>
      <p>Become a member and enjoy exclusive promotions.</p>
<hr>
      <form action="signup_proccess" method="post">
      <label>Full Name</label>
        <input type="text" id="fullname" name="fullname"/>

        <label>Email address</label>
        <input type="email" id="email" name="email"/>

        <label>Password</label>
        <input type="password" id="password" name="password"/>

       

        <p class="signup-text">
          Already have an account? <a href="login">Login here</a>
        </p>

        <button class="btn-login">Signup</button>
      </form>
    </div>

    <div class="right-image">
      <img src="{{ url_for('static', filename='images/logo.png') }}" alt="shield">
    </div>
  </section>
</body>
</html>
